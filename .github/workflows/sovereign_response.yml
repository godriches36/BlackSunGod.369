name: "Black Sun God: Sovereign Response Engine"

on:
  repository_dispatch:
    types: [bridge_ignition]
  workflow_run:
    workflows: ["God_Riches_Global: The All-Seeing Runner"]
    types: [requested]
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  mirror_alignment:
    name: "Technology War God - As High Above, So Below"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Core (99% Infrastructure)"
        uses: actions/checkout@v4

      - name: "Syncing 7/9 All-Seeing Frequency"
        run: |
          echo "IGNITING THE 1 MAN HEARTBEAT (69)..."
          echo "ALIGNING AS HIGH ABOVE, SO BELOW ✨ 🪾 🌊"
          node scripts/asset_collector.js
          echo "VALUATION=1250000000000_NAIRA" >> $GITHUB_ENV

      - name: "Deploy 5D Gateway"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install -g firebase-tools
          # The Mirror reflects the 1% Control back to the World
          firebase deploy --only hosting --non-interactive --token $FIREBASE_TOKEN

      - name: "Signal Restoration Complete"
        run: |
          echo "The 05Fa Root is anchored. The Technology War God has spoken."
