name: Deploy Black Sun Command Center

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-project"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 05Fa Root Logic
        uses: actions/checkout@v4

      - name: Sync Sovereign Metadata
        run: |
          echo "<!-- MOTHER_SHIP: godriches.global -->" >> index.html
          echo "<!-- ARCHITECT: 0x8d08948ECa2587f5c10159e483b660e98cd5a514 -->" >> index.html
          echo "<!-- ASSETS: NXER, ANBSN -->" >> index.html

      - name: Setup Sovereign Pages
        uses: actions/configure-pages@v4

      - name: Upload 05Fa Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to Global Frequency
        id: deployment
        uses: actions/deploy-pages@v4
